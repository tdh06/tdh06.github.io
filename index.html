<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
    }

    /* NAVBAR */
    nav {
      background: #000;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav h1 {
      margin: 0;
      font-size: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 40px;
    }

    .hero p {
      color: #aaa;
    }

    .hero button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
    }

    /* SECTIONS */
    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      width: 250px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>MySite</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h2>Welcome to My Website</h2>
  <p>This is my first real interface</p>
  <button onclick="alert('It works!')">Get Started</button>
</div>

<!-- SECTION -->
<div class="section">
  <h2>What I Do</h2>

  <div class="card">💻 Coding</div>
  <div class="card">🎨 Design</div>
  <div class="card">🚀 Projects</div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 My Website</p>
</footer>

</body>
</html>
